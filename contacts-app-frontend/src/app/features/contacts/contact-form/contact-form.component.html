<div class="form-page">
  <div class="form-card">
    <h1 class="form-title">
      {{ isEditMode ? 'Modifier un contact' : 'Ajouter un contact' }}
    </h1>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label class="form-label" for="firstName">Prénom</label>
        <input
          id="firstName"
          type="text"
          class="form-input"
          [class.form-input--error]="firstNameControl.invalid && firstNameControl.touched"
          formControlName="firstName"
          placeholder="Prénom"
          autocomplete="given-name"
        />
        <span
          class="form-error"
          *ngIf="firstNameControl.invalid && firstNameControl.touched"
        >
          Le prénom est obligatoire
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="lastName">Nom</label>
        <input
          id="lastName"
          type="text"
          class="form-input"
          [class.form-input--error]="lastNameControl.invalid && lastNameControl.touched"
          formControlName="lastName"
          placeholder="Nom"
          autocomplete="family-name"
        />
        <span
          class="form-error"
          *ngIf="lastNameControl.invalid && lastNameControl.touched"
        >
          Le nom est obligatoire
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-input"
          [class.form-input--error]="emailControl.invalid && emailControl.touched"
          formControlName="email"
          placeholder="email@exemple.com"
          autocomplete="email"
        />
        <span
          class="form-error"
          *ngIf="emailControl.invalid && emailControl.touched"
        >
          Email invalide
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">Téléphone <span class="form-label--optional">(optionnel)</span></label>
        <input
          id="phone"
          type="tel"
          class="form-input"
          formControlName="phone"
          placeholder="0600000000"
          autocomplete="tel"
        />
      </div>

      <div class="form-error-api" *ngIf="apiError">
        {{ apiError }}
      </div>

      <div class="form-actions">
        <a
          class="btn btn-secondary"
          routerLink="/contacts"
        >
          Annuler
        </a>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="contactForm.invalid || isLoading"
        >
          {{ isLoading ? 'Enregistrement...' : 'Sauvegarder' }}
        </button>
      </div>

    </form>
  </div>
</div>
